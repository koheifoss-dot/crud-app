<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do App</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --surface: #fff;
      --text: #333;
      --muted: #666;
      --border: #ccc;
    }
    body.dark {
      --bg: #1a1a2e;
      --surface: #16213e;
      --text: #e0e0e0;
      --muted: #9ca3af;
      --border: #374151;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 2rem; transition: background .2s, color .2s; }

    /* Header row */
    .header-row { position: relative; margin-bottom: calc(1.5rem + 100px); }
    h1 { font-size: 1.5rem; }
    #dark-toggle {
      position: absolute; top: 0; right: 0;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: .35rem .7rem; font-size: 1rem; cursor: pointer;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }
    #dark-toggle:hover { filter: brightness(.9); }

    .card { background: var(--surface); border-radius: 8px; padding: 1.25rem; margin-bottom: calc(1rem + 100px); box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    form { display: grid; gap: .75rem; }
    .row { display: flex; gap: .5rem; flex-wrap: wrap; }
    input[type="text"], input[type="date"] { border: 1px solid var(--border); border-radius: 4px; padding: .4rem .6rem; font-size: .9rem; background: var(--surface); color: var(--text); }
    input[type="text"] { flex: 1; min-width: 12rem; }
    button { cursor: pointer; border: none; border-radius: 4px; padding: .4rem .8rem; font-size: .85rem; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-save { background: #22c55e; color: #fff; }
    .btn-save:hover { background: #16a34a; }
    .btn-edit { background: #f59e0b; color: #fff; }
    .btn-edit:hover { background: #d97706; }
    #task-list { list-style: none; }
    .task-item { background: var(--surface); border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: .6rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); display: flex; align-items: flex-start; gap: .75rem; }
    .task-item.completed .task-title { text-decoration: line-through; color: var(--muted); }
    .task-check { margin-top: 3px; width: 1rem; height: 1rem; cursor: pointer; flex-shrink: 0; }
    .task-body { flex: 1; }
    .task-title { font-size: 1rem; }
    .task-dates { font-size: .78rem; color: var(--muted); margin-top: .3rem; }
    .task-actions { display: flex; gap: .4rem; flex-shrink: 0; }
    .edit-form { display: grid; gap: .5rem; margin-top: .5rem; }
    .edit-form .row { gap: .4rem; }
    label { font-size: .8rem; color: var(--muted); }
    .date-group { display: flex; flex-direction: column; gap: .2rem; }
    .hidden { display: none; }
    .empty { color: var(--muted); font-style: italic; padding: .5rem 0; }

    /* Filter bar */
    .filter-section { margin-bottom: calc(1rem + 100px); }
    .filter-header { font-size: .8rem; color: var(--muted); margin-bottom: .4rem; text-transform: uppercase; letter-spacing: .04em; }
    .filter-pills { display: flex; flex-wrap: wrap; gap: .35rem; min-height: 1.5rem; }
    .filter-pill {
      display: inline-flex; align-items: center;
      border-radius: 999px; padding: .2rem .65rem;
      font-size: .73rem; font-weight: 500;
      cursor: pointer;
      transition: filter .15s;
      border: 2px solid transparent;
    }
    .filter-pill:hover { filter: brightness(.9); }
    .filter-pill.active { border-color: #1d4ed8; }

    /* Tag pills (display) */
    .task-tags { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .35rem; }
    .tag-pill {
      display: inline-flex; align-items: center;
      border-radius: 999px; padding: .15rem .55rem;
      font-size: .73rem; font-weight: 500;
    }

    /* Tag chip input */
    .tag-field { display: flex; flex-direction: column; gap: .2rem; }
    .tag-input-wrap {
      display: flex; flex-wrap: wrap; gap: .3rem; align-items: center;
      border: 1px solid var(--border); border-radius: 4px; padding: .3rem .4rem;
      min-height: 2.1rem; cursor: text; background: var(--surface);
    }
    .tag-input-wrap:focus-within { border-color: #3b82f6; outline: none; }
    .tag-input-wrap input {
      border: none; outline: none; font-size: .85rem;
      min-width: 6rem; flex: 1; padding: .1rem 0;
      background: transparent; color: var(--text);
    }
    .tag-chip {
      display: inline-flex; align-items: center; gap: .2rem;
      border-radius: 999px; padding: .15rem .5rem;
      font-size: .73rem; font-weight: 500;
    }
    .tag-remove {
      background: none; border: none; cursor: pointer;
      padding: 0; line-height: 1; font-size: .8rem;
      opacity: .7; display: inline-flex; align-items: center;
    }
    .tag-remove:hover { opacity: 1; }

    /* Tag manager */
    #tag-manager { margin-bottom: calc(1rem + 100px); }
    #tag-manager h2 { font-size: 1rem; margin-bottom: .75rem; color: var(--text); }
    .tag-manager-list { list-style: none; display: flex; flex-direction: column; gap: .5rem; }
    .tag-manager-row { position: relative; }
    .tag-manager-main { display: flex; align-items: center; gap: .6rem; }
    .tag-swatch { width: 1rem; height: 1rem; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0,0,0,.1); }
    .tag-manager-name { font-size: .9rem; flex: 1; color: var(--text); }
    .tag-menu-btn {
      background: none; border: 1px solid var(--border); border-radius: 4px;
      padding: .15rem .45rem; font-size: .85rem; color: var(--muted); line-height: 1;
    }
    .tag-menu-btn:hover { background: var(--bg); }
    .tag-menu {
      position: absolute; right: 0; top: calc(100% + .25rem); z-index: 100;
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15); padding: .6rem;
      min-width: 220px; display: flex; flex-direction: column; gap: .5rem;
    }
    .tag-menu.hidden { display: none; }
    .color-row { display: flex; align-items: center; gap: .4rem; }
    .color-row input[type="color"] { width: 2rem; height: 2rem; padding: 0; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: none; }
    .color-row input[type="text"] { width: 6rem; flex: none; font-family: monospace; font-size: .8rem; }
    .color-row button { font-size: .8rem; background: #3b82f6; color: #fff; }
    .color-row button:hover { background: #2563eb; }
    .tag-menu hr { border: none; border-top: 1px solid var(--border); margin: .1rem 0; }
    .tag-menu-action {
      background: none; border: 1px solid var(--border); border-radius: 4px;
      padding: .3rem .6rem; font-size: .82rem; color: var(--text);
      text-align: left; width: 100%;
    }
    .tag-menu-action:hover { background: var(--bg); }
    .tag-menu-action.danger { color: #ef4444; border-color: #ef4444; }
    .tag-menu-action.danger:hover { background: #fef2f2; }
  </style>
</head>
<body>
  <div class="header-row">
    <h1>To-Do App</h1>
    <button id="dark-toggle" title="Toggle dark mode">🌙</button>
  </div>

  <div class="filter-section">
    <div class="filter-header">Filter by tag</div>
    <div class="filter-pills" id="filter-pills"></div>
  </div>

  <div class="card">
    <form id="create-form">
      <div class="row">
        <input type="text" id="new-title" placeholder="Task title" required />
        <button type="submit" class="btn-primary">Add Task</button>
      </div>
      <div class="row">
        <div class="date-group">
          <label for="new-start">Start date</label>
          <input type="date" id="new-start" />
        </div>
        <div class="date-group">
          <label for="new-end">End date</label>
          <input type="date" id="new-end" />
        </div>
        <div class="date-group">
          <label for="new-due">Due date</label>
          <input type="date" id="new-due" />
        </div>
      </div>
      <div class="tag-field">
        <label>Tags (press Enter or comma to add)</label>
        <div class="tag-input-wrap" id="new-tag-wrap"></div>
      </div>
    </form>
  </div>

  <div class="card" id="tag-manager">
    <h2>Tag Management</h2>
    <ul class="tag-manager-list" id="tag-manager-list">
      <li class="empty">No tags yet — they'll appear here once you add them to tasks.</li>
    </ul>
  </div>

  <datalist id="tag-datalist"></datalist>

  <ul id="task-list"></ul>

  <script>
    // --- Dark mode ---
    (function() {
      if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark');
      }
    })();

    const darkToggle = document.getElementById('dark-toggle');
    function updateToggleIcon() {
      darkToggle.textContent = document.body.classList.contains('dark') ? '☀' : '🌙';
    }
    updateToggleIcon();
    darkToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('darkMode', isDark);
      updateToggleIcon();
    });

    // --- Client-side luminance helper ---
    function hexToTextColor(hex) {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      const toLinear = v => { const s=v/255; return s<=0.03928?s/12.92:Math.pow((s+0.055)/1.055,2.4); };
      const lum = 0.2126*toLinear(r) + 0.7152*toLinear(g) + 0.0722*toLinear(b);
      return lum > 0.179 ? '#000000' : '#ffffff';
    }

    const list = document.getElementById('task-list');
    const filterPillsEl = document.getElementById('filter-pills');
    const tagManagerList = document.getElementById('tag-manager-list');

    let allTasks = [];
    let allTags = [];
    let activeTagIds = new Set();
    let createTagInput = null;
    let openMenuTagId = null;

    async function loadAll() {
      const [tasksRes, tagsRes] = await Promise.all([
        fetch('/api/tasks'),
        fetch('/api/tags'),
      ]);
      allTasks = await tasksRes.json();
      allTags = await tagsRes.json();

      // Clean stale active tag IDs
      const validIds = new Set(allTags.map(t => t.id));
      activeTagIds.forEach(id => { if (!validIds.has(id)) activeTagIds.delete(id); });
      if (openMenuTagId && !validIds.has(openMenuTagId)) openMenuTagId = null;

      updateTagDatalist();
      renderFilterBar();
      renderTagManager();
      renderTasks();
    }

    function updateTagDatalist() {
      const dl = document.getElementById('tag-datalist');
      dl.innerHTML = allTags.map(t => `<option value="${escHtml(t.name)}">`).join('');
    }

    function renderFilterBar() {
      if (!allTags.length) {
        filterPillsEl.innerHTML = '';
        return;
      }
      filterPillsEl.innerHTML = allTags.map(tag => {
        const active = activeTagIds.has(tag.id) ? ' active' : '';
        return `<span class="filter-pill${active}" data-tag-id="${tag.id}"
          style="background:${tag.color};color:${tag.textColor}">${escHtml(tag.name)}</span>`;
      }).join('');
      filterPillsEl.querySelectorAll('.filter-pill').forEach(pill => {
        pill.addEventListener('click', () => {
          const id = pill.dataset.tagId;
          if (activeTagIds.has(id)) activeTagIds.delete(id);
          else activeTagIds.add(id);
          renderFilterBar();
          renderTasks();
        });
      });
    }

    function renderTagManager() {
      if (!allTags.length) {
        tagManagerList.innerHTML = `<li class="empty">No tags yet — they'll appear here once you add them to tasks.</li>`;
        return;
      }
      tagManagerList.innerHTML = allTags.map(tag => `
        <li class="tag-manager-row" data-tag-id="${tag.id}">
          <div class="tag-manager-main">
            <span class="tag-swatch" style="background:${tag.color}"></span>
            <span class="tag-manager-name">${escHtml(tag.name)}</span>
            <button class="tag-menu-btn" title="Tag options">⋯</button>
          </div>
          <div class="tag-menu hidden" data-menu-id="${tag.id}">
            <div class="color-row">
              <input type="color" value="${tag.color}" title="Pick color" />
              <input type="text" value="${tag.color}" maxlength="7" placeholder="#rrggbb" />
              <button class="save-color-btn">Save</button>
            </div>
            <hr />
            <button class="tag-menu-action toggle-filter-btn">${activeTagIds.has(tag.id) ? 'Clear filter' : 'Show only these tasks'}</button>
            <button class="tag-menu-action danger delete-tag-btn">Delete tag</button>
          </div>
        </li>
      `).join('');

      tagManagerList.querySelectorAll('.tag-manager-row').forEach(row => {
        const tagId = row.dataset.tagId;
        const tag = allTags.find(t => t.id === tagId);
        const menu = row.querySelector('.tag-menu');
        const menuBtn = row.querySelector('.tag-menu-btn');
        const colorPicker = row.querySelector('input[type="color"]');
        const hexInput = row.querySelector('.color-row input[type="text"]');
        const swatch = row.querySelector('.tag-swatch');

        menuBtn.addEventListener('click', e => {
          e.stopPropagation();
          const isOpen = !menu.classList.contains('hidden');
          closeAllMenus();
          if (!isOpen) {
            menu.classList.remove('hidden');
            openMenuTagId = tagId;
          }
        });

        // Live preview: color picker → hex input + swatch
        colorPicker.addEventListener('input', () => {
          const hex = colorPicker.value;
          hexInput.value = hex;
          swatch.style.background = hex;
        });

        // Live preview: hex input → color picker + swatch
        hexInput.addEventListener('input', () => {
          const val = hexInput.value;
          if (/^#[0-9a-fA-F]{6}$/.test(val)) {
            colorPicker.value = val;
            swatch.style.background = val;
          }
        });

        row.querySelector('.save-color-btn').addEventListener('click', async () => {
          const hex = hexInput.value;
          if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
          await fetch(`/api/tags/${tagId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ color: hex }),
          });
          openMenuTagId = null;
          loadAll();
        });

        row.querySelector('.toggle-filter-btn').addEventListener('click', () => {
          if (activeTagIds.has(tagId)) activeTagIds.delete(tagId);
          else activeTagIds.add(tagId);
          closeAllMenus();
          renderFilterBar();
          renderTagManager();
          renderTasks();
        });

        row.querySelector('.delete-tag-btn').addEventListener('click', async () => {
          if (!confirm(`Delete tag "${tag.name}"? It will be removed from all tasks.`)) return;
          activeTagIds.delete(tagId);
          openMenuTagId = null;
          await fetch(`/api/tags/${tagId}`, { method: 'DELETE' });
          loadAll();
        });
      });

      // Restore open menu
      if (openMenuTagId) {
        const menu = tagManagerList.querySelector(`[data-menu-id="${openMenuTagId}"]`);
        if (menu) menu.classList.remove('hidden');
      }
    }

    function closeAllMenus() {
      tagManagerList.querySelectorAll('.tag-menu').forEach(m => m.classList.add('hidden'));
      openMenuTagId = null;
    }

    // Close menus on outside click
    document.addEventListener('click', () => {
      closeAllMenus();
    });

    function renderTasks() {
      let tasks = allTasks;
      if (activeTagIds.size > 0) {
        tasks = allTasks.filter(t =>
          t.tags && t.tags.some(tag => activeTagIds.has(tag.id))
        );
      }
      render(tasks);
    }

    function fmt(d) {
      return d ? new Date(d + 'T00:00:00').toLocaleDateString() : null;
    }

    function dateStr(task) {
      const parts = [];
      if (task.startDate) parts.push('Start: ' + fmt(task.startDate));
      if (task.endDate)   parts.push('End: '   + fmt(task.endDate));
      if (task.dueDate)   parts.push('Due: '   + fmt(task.dueDate));
      return parts.join('  ·  ');
    }

    function tagPillsHtml(tags) {
      if (!tags || !tags.length) return '';
      return `<div class="task-tags">${tags.map(tag =>
        `<span class="tag-pill" style="background:${tag.color};color:${tag.textColor}">${escHtml(tag.name)}</span>`
      ).join('')}</div>`;
    }

    function render(tasks) {
      if (!tasks.length) {
        const msg = activeTagIds.size > 0
          ? 'No tasks match the selected filter.'
          : 'No tasks yet. Add one above!';
        list.innerHTML = `<li class="empty">${msg}</li>`;
        return;
      }
      list.innerHTML = tasks.map(t => `
        <li class="task-item${t.completed ? ' completed' : ''}" data-id="${t.id}">
          <input class="task-check" type="checkbox" ${t.completed ? 'checked' : ''} title="Toggle complete" />
          <div class="task-body">
            <div class="task-title">${escHtml(t.title)}</div>
            ${tagPillsHtml(t.tags)}
            ${dateStr(t) ? `<div class="task-dates">${dateStr(t)}</div>` : ''}
            <div class="edit-form hidden">
              <input type="text" class="edit-title" value="${escHtml(t.title)}" />
              <div class="row">
                <div class="date-group"><label>Start</label><input type="date" class="edit-start" value="${t.startDate||''}" /></div>
                <div class="date-group"><label>End</label><input type="date" class="edit-end" value="${t.endDate||''}" /></div>
                <div class="date-group"><label>Due</label><input type="date" class="edit-due" value="${t.dueDate||''}" /></div>
              </div>
              <div class="tag-field">
                <label>Tags</label>
                <div class="tag-input-wrap edit-tag-wrap"></div>
              </div>
              <div class="row">
                <button class="btn-save save-btn">Save</button>
                <button class="cancel-btn" style="background:#e5e7eb">Cancel</button>
              </div>
            </div>
          </div>
          <div class="task-actions">
            <button class="btn-edit edit-btn">Edit</button>
            <button class="btn-danger delete-btn">Delete</button>
          </div>
        </li>
      `).join('');

      list.querySelectorAll('.task-item').forEach(item => {
        const id = item.dataset.id;
        const task = tasks.find(t => t.id === id);
        item.querySelector('.task-check').addEventListener('change', e => toggleComplete(id, e.target.checked));
        item.querySelector('.edit-btn').addEventListener('click', () => openEdit(item, task));
        item.querySelector('.cancel-btn').addEventListener('click', () => closeEdit(item));
        item.querySelector('.save-btn').addEventListener('click', () => saveEdit(id, item));
        item.querySelector('.delete-btn').addEventListener('click', () => deleteTask(id));
      });
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // --- Tag chip input ---
    function initTagInput(wrapEl, initialTags) {
      wrapEl.innerHTML = '';
      const chips = []; // { name, color, textColor }

      const input = document.createElement('input');
      input.type = 'text';
      input.setAttribute('list', 'tag-datalist');
      input.placeholder = 'Add tag…';
      wrapEl.appendChild(input);

      function addChip(name) {
        name = name.trim().toLowerCase();
        if (!name || chips.find(c => c.name === name)) return;
        const existing = allTags.find(t => t.name === name);
        const color = existing ? existing.color : '#e5e7eb';
        const textColor = existing ? existing.textColor : '#333333';
        chips.push({ name, color, textColor });
        renderChips();
        input.value = '';
      }

      function removeChip(name) {
        const idx = chips.findIndex(c => c.name === name);
        if (idx !== -1) chips.splice(idx, 1);
        renderChips();
      }

      function renderChips() {
        wrapEl.querySelectorAll('.tag-chip').forEach(el => el.remove());
        chips.forEach(chip => {
          const el = document.createElement('span');
          el.className = 'tag-chip';
          el.style.background = chip.color;
          el.style.color = chip.textColor;
          el.innerHTML = `${escHtml(chip.name)}<button class="tag-remove" type="button" aria-label="Remove tag">×</button>`;
          el.querySelector('.tag-remove').addEventListener('click', () => removeChip(chip.name));
          wrapEl.insertBefore(el, input);
        });
      }

      if (initialTags) {
        initialTags.forEach(tag => {
          chips.push({ name: tag.name, color: tag.color, textColor: tag.textColor });
        });
        renderChips();
      }

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ',') {
          e.preventDefault();
          addChip(input.value.replace(',', ''));
        } else if (e.key === 'Backspace' && input.value === '' && chips.length) {
          removeChip(chips[chips.length - 1].name);
        }
      });

      wrapEl.addEventListener('click', () => input.focus());

      return {
        getTagNames() { return chips.map(c => c.name); }
      };
    }

    function openEdit(item, task) {
      item.querySelector('.edit-form').classList.remove('hidden');
      item.querySelector('.edit-btn').classList.add('hidden');
      const editWrap = item.querySelector('.edit-tag-wrap');
      const tagInput = initTagInput(editWrap, task.tags || []);
      item._tagInput = tagInput;
    }

    function closeEdit(item) {
      item.querySelector('.edit-form').classList.add('hidden');
      item.querySelector('.edit-btn').classList.remove('hidden');
    }

    async function toggleComplete(id, completed) {
      await fetch(`/api/tasks/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed }),
      });
      loadAll();
    }

    async function saveEdit(id, item) {
      const title = item.querySelector('.edit-title').value.trim();
      if (!title) return;
      const tags = item._tagInput ? item._tagInput.getTagNames() : undefined;
      const body = {
        title,
        startDate: item.querySelector('.edit-start').value || undefined,
        endDate:   item.querySelector('.edit-end').value   || undefined,
        dueDate:   item.querySelector('.edit-due').value   || undefined,
        tags,
      };
      await fetch(`/api/tasks/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      loadAll();
    }

    async function deleteTask(id) {
      if (!confirm('Delete this task?')) return;
      await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
      loadAll();
    }

    document.getElementById('create-form').addEventListener('submit', async e => {
      e.preventDefault();
      const title = document.getElementById('new-title').value.trim();
      if (!title) return;
      const tags = createTagInput ? createTagInput.getTagNames() : [];
      const body = {
        title,
        startDate: document.getElementById('new-start').value || undefined,
        endDate:   document.getElementById('new-end').value   || undefined,
        dueDate:   document.getElementById('new-due').value   || undefined,
        tags,
      };
      await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      e.target.reset();
      createTagInput = initTagInput(document.getElementById('new-tag-wrap'), []);
      loadAll();
    });

    // Initialize create-form tag input
    createTagInput = initTagInput(document.getElementById('new-tag-wrap'), []);

    loadAll();
  </script>
